version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: bible_scholar
      POSTGRES_USER: scholar
      POSTGRES_PASSWORD: scholar_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scholar -d bible_scholar"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.12.2
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: scholar
      RABBITMQ_DEFAULT_PASS: scholar_secret

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/scholar_secret
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neodata:/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: scholar
      MINIO_ROOT_PASSWORD: scholar_secret
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  esdata:
  redisdata:
  neodata:
  miniodata:
