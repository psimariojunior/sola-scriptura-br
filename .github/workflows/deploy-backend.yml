name: Deploy Backend to Oracle VM

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VM_IP }} >> ~/.ssh/known_hosts

      - name: Sync files
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            --exclude 'node_modules' \
            --exclude '.env' \
            --exclude 'dist' \
            backend/ \
            ${{ secrets.VM_USER }}@${{ secrets.VM_IP }}:/opt/sola-scriptura/backend/

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VM_USER }}@${{ secrets.VM_IP }} << 'EOF'
            cd /opt/sola-scriptura/backend/docker
            docker-compose down
            docker-compose up -d --build
            sleep 10
            docker-compose logs --tail=10 backend
          EOF

      - name: Health check
        run: |
          sleep 15
          curl -f http://${{ secrets.VM_IP }}:4000/api/v1/health || exit 1

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
