apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sola-scriptura-ingress
  namespace: sola-scriptura
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.solascripturabr.com.br
        - solascripturabr.com.br
      secretName: sola-scriptura-tls
  rules:
    - host: api.solascripturabr.com.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 4000
    - host: solascripturabr.com.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 3000
