<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d060"/>
      <stop offset="50%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#b8912e"/>
    </linearGradient>
    <linearGradient id="page" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#e8e0d0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="#0d0d0d" stroke="url(#gold)" stroke-width="4"/>

  <!-- Open book - left page -->
  <path d="M256 140 L120 160 L120 370 L256 350 Z" fill="url(#page)" filter="url(#shadow)" opacity="0.95"/>

  <!-- Open book - right page -->
  <path d="M256 140 L392 160 L392 370 L256 350 Z" fill="url(#page)" filter="url(#shadow)" opacity="0.95"/>

  <!-- Book spine -->
  <path d="M256 140 L256 350" stroke="url(#gold)" stroke-width="3" fill="none"/>

  <!-- Page lines - left -->
  <line x1="145" y1="195" x2="240" y2="185" stroke="#c0b8a8" stroke-width="1.5" opacity="0.6"/>
  <line x1="145" y1="215" x2="240" y2="205" stroke="#c0b8a8" stroke-width="1.5" opacity="0.6"/>
  <line x1="145" y1="235" x2="240" y2="225" stroke="#c0b8a8" stroke-width="1.5" opacity="0.6"/>
  <line x1="145" y1="255" x2="240" y2="245" stroke="#c0b8a8" stroke-width="1.5" opacity="0.6"/>
  <line x1="145" y1="275" x2="240" y2="265" stroke="#c0b8a8" stroke-width="1.5" opacity="0.6"/>
  <line x1="145" y1="295" x2="240" y2="285" stroke="#c0b8a8" stroke-width="1.5" opacity="0.6"/>
  <line x1="145" y1="315" x2="240" y2="305" stroke="#c0b8a8" stroke-width="1.5" opacity="0.6"/>

  <!-- Page lines - right -->
  <line x1="272" y1="185" x2="367" y2="195" stroke="#c0b8a8" stroke-width="1.5" opacity="0.6"/>
  <line x1="272" y1="205" x2="367" y2="215" stroke="#c0b8a8" stroke-width="1.5" opacity="0.6"/>
  <line x1="272" y1="225" x2="367" y2="235" stroke="#c0b8a8" stroke-width="1.5" opacity="0.6"/>
  <line x1="272" y1="245" x2="367" y2="255" stroke="#c0b8a8" stroke-width="1.5" opacity="0.6"/>
  <line x1="272" y1="265" x2="367" y2="275" stroke="#c0b8a8" stroke-width="1.5" opacity="0.6"/>
  <line x1="272" y1="285" x2="367" y2="295" stroke="#c0b8a8" stroke-width="1.5" opacity="0.6"/>
  <line x1="272" y1="305" x2="367" y2="315" stroke="#c0b8a8" stroke-width="1.5" opacity="0.6"/>

  <!-- Golden cross on center -->
  <g transform="translate(256, 235)">
    <!-- Cross vertical -->
    <rect x="-6" y="-45" width="12" height="72" rx="2" fill="url(#gold)"/>
    <!-- Cross horizontal -->
    <rect x="-22" y="-30" width="44" height="12" rx="2" fill="url(#gold)"/>
    <!-- Cross center jewel -->
    <circle cx="0" cy="-24" r="4" fill="#f0d060" opacity="0.8"/>
  </g>

  <!-- Text "SS" monogram -->
  <text x="256" y="420" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="600" fill="url(#gold)" letter-spacing="8">SOLA SCRIPTURA</text>

  <!-- Decorative line under text -->
  <line x1="170" y1="435" x2="342" y2="435" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>
</svg>
