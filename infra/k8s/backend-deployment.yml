apiVersion: apps/v1
kind: Deployment
metadata:
  name: sola-scriptura-backend
  namespace: sola-scriptura
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sola-scriptura-backend
  template:
    metadata:
      labels:
        app: sola-scriptura-backend
    spec:
      containers:
        - name: backend
          image: sola-scriptura/backend:latest
          ports:
            - containerPort: 4000
          env:
            - name: NODE_ENV
              value: "production"
            - name: DB_HOST
              value: "postgres-service"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: password
            - name: DB_NAME
              value: "sola_scriptura"
            - name: REDIS_HOST
              value: "redis-service"
            - name: ELASTICSEARCH_URL
              value: "http://elasticsearch-service:9200"
            - name: RABBITMQ_URL
              value: "amqp://rabbitmq-service:5672"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: sola-scriptura
spec:
  selector:
    app: sola-scriptura-backend
  ports:
    - port: 4000
      targetPort: 4000
  type: ClusterIP
