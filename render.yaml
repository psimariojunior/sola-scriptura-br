services:
  - type: web
    name: sola-scriptura-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: sola-scriptura-db
          property: connectionString
      - key: DB_HOST
        fromDatabase:
          name: sola-scriptura-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: sola-scriptura-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: sola-scriptura-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: sola-scriptura-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: sola-scriptura-db
          property: database
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 15m
      - key: JWT_REFRESH_EXPIRATION
        value: 7d
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: MFA_APP_NAME
        value: Sola Scriptura BR

databases:
  - name: sola-scriptura-db
    plan: free
    databaseName: sola_scriptura
    user: sola_scriptura
