apiVersion: apps/v1
kind: Deployment
metadata:
  name: bible-scholar-backend
  labels:
    app: bible-scholar
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bible-scholar
      tier: backend
  template:
    metadata:
      labels:
        app: bible-scholar
        tier: backend
    spec:
      containers:
        - name: backend
          image: bible-scholar/backend:latest
          ports:
            - containerPort: 4000
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: bible-scholar-config
                  key: DB_HOST
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: bible-scholar-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bible-scholar-secrets
                  key: DB_PASSWORD
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bible-scholar-secrets
                  key: OPENAI_API_KEY
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/v1/biblia/versoes
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/biblia/versoes
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: bible-scholar-backend
spec:
  selector:
    app: bible-scholar
    tier: backend
  ports:
    - port: 4000
      targetPort: 4000
  type: ClusterIP
