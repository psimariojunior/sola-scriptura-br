apiVersion: v1
kind: ConfigMap
metadata:
  name: sola-scriptura-config
  namespace: sola-scriptura
data:
  NODE_ENV: "production"
  DB_NAME: "sola_scriptura"
  DB_HOST: "postgres-service"
  REDIS_HOST: "redis-service"
  ELASTICSEARCH_URL: "http://elasticsearch-service:9200"
  RABBITMQ_URL: "amqp://rabbitmq-service:5672"
  IA_MODEL: "gpt-4"
  IA_TEMPERATURE: "0.3"
  IA_MAX_TOKENS: "4096"
  AWS_REGION: "us-east-1"
