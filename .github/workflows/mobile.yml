name: Mobile CI/CD

on:
  push:
    paths:
      - 'mobile/**'
  pull_request:
    paths:
      - 'mobile/**'

jobs:
  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            mobile/.dart_tool/
            mobile/.pub-cache/
          key: flutter-pub-${{ hashFiles('mobile/pubspec.lock') }}
          restore-keys: flutter-pub-

      - run: flutter pub get

      - run: flutter analyze

  test:
    name: Flutter Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            mobile/.dart_tool/
            mobile/.pub-cache/
          key: flutter-pub-${{ hashFiles('mobile/pubspec.lock') }}
          restore-keys: flutter-pub-

      - run: flutter pub get

      - run: flutter test

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [analyze, test]
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            mobile/.dart_tool/
            mobile/.pub-cache/
          key: flutter-pub-${{ hashFiles('mobile/pubspec.lock') }}
          restore-keys: flutter-pub-

      - run: flutter pub get

      - run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mobile-debug-apk
          path: mobile/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14
