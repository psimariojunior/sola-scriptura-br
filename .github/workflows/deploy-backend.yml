name: Deploy Backend to Oracle VM

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VM_IP }} >> ~/.ssh/known_hosts

      - name: Create tarball
        run: |
          tar czf /tmp/backend.tar.gz \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='dist' \
            --exclude='*.log' \
            --exclude='.git' \
            backend/

      - name: Upload to VM
        run: |
          scp -i ~/.ssh/deploy_key /tmp/backend.tar.gz \
            ${{ secrets.VM_USER }}@${{ secrets.VM_IP }}:/tmp/backend.tar.gz

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VM_USER }}@${{ secrets.VM_IP }} << 'DEPLOY_SCRIPT'
            set -euo pipefail

            echo "=== Extraindo arquivos ==="
            cd /opt/sola-scriptura
            sudo rm -rf backend
            mkdir -p backend
            tar xzf /tmp/backend.tar.gz --strip-components=1 -C backend/
            rm -f /tmp/backend.tar.gz

            echo "=== Parando containers ==="
            cd backend/docker
            docker compose down --remove-orphans 2>/dev/null || docker-compose down --remove-orphans 2>/dev/null || true

            echo "=== Subindo infraestrutura ==="
            docker compose up -d --build postgres redis 2>/dev/null || docker-compose up -d --build postgres redis
            sleep 10

            echo "=== Aguardando PostgreSQL ==="
            for i in $(seq 1 30); do
              if docker compose exec -T postgres pg_isready -U sola_scriptura 2>/dev/null || docker-compose exec -T postgres pg_isready -U sola_scriptura 2>/dev/null; then
                echo "PostgreSQL pronto"
                break
              fi
              sleep 2
            done

            echo "=== Build e subir backend ==="
            docker compose up -d --build backend 2>/dev/null || docker-compose up -d --build backend
            sleep 15

            echo "=== Rodando migrations ==="
            docker compose exec -T backend node -e "
              const{DataSource}=require('typeorm');
              const ds=new DataSource({
                type:'postgres',
                host:process.env.DB_HOST||'postgres',
                port:parseInt(process.env.DB_PORT)||5432,
                username:process.env.DB_USER||'sola_scriptura',
                password:process.env.DB_PASSWORD,
                database:process.env.DB_NAME||'sola_scriptura',
                ssl:false,
                entities:['dist/**/*.entity.js'],
                migrations:['dist/infra/database/migrations/*.js'],
                synchronize:false
              });
              ds.initialize().then(async()=>{
                try{await ds.runMigrations();console.log('Migrations OK')}
                catch(e){console.log('Migration skip:',e.message)}
                await ds.destroy();process.exit(0);
              }).catch(e=>{console.error(e);process.exit(1);})
            " 2>/dev/null || echo "Migrations skip"

            echo "=== Verificando necessidade de seed ==="
            SEED_COUNT=$(docker compose exec -T backend node -e "
              const{DataSource}=require('typeorm');
              const ds=new DataSource({
                type:'postgres',
                host:process.env.DB_HOST||'postgres',
                port:parseInt(process.env.DB_PORT)||5432,
                username:process.env.DB_USER||'sola_scriptura',
                password:process.env.DB_PASSWORD,
                database:process.env.DB_NAME||'sola_scriptura',
                ssl:false,
                entities:['dist/**/*.entity.js'],
                synchronize:false
              });
              ds.initialize().then(async()=>{
                const c=await ds.query('SELECT COUNT(*) FROM livros');
                console.log(c[0].count);
                await ds.destroy();process.exit(0);
              }).catch(e=>{console.error('0');process.exit(0);})
            " 2>/dev/null || echo "0")

            if [ "$SEED_COUNT" = "0" ]; then
              echo "=== Banco vazio, rodando seed ==="
              docker compose exec -T backend node dist/infra/database/seed.js 2>/dev/null || echo "Seed via compiled JS falhou"
            else
              echo "=== Banco já populado ($SEED_COUNT livros) ==="
            fi

            echo "=== Health check ==="
            for i in $(seq 1 60); do
              if curl -sf http://localhost:4000/api/v1/health >/dev/null 2>&1; then
                echo "Backend saudável!"
                break
              fi
              if [ "$i" -eq 60 ]; then
                echo "Backend não respondeu em 120s"
                docker compose logs --tail=30 backend 2>/dev/null || docker-compose logs --tail=30 backend
                exit 1
              fi
              sleep 2
            done

            echo "=== Deploy concluído ==="
            docker compose ps 2>/dev/null || docker-compose ps
          DEPLOY_SCRIPT

      - name: Health check externo
        run: |
          echo "Aguardando backend estabilizar..."
          sleep 30
          for i in $(seq 1 10); do
            if curl -sf "http://${{ secrets.VM_IP }}:4000/api/v1/health" >/dev/null 2>&1; then
              echo "Backend respondendo externamente!"
              exit 0
            fi
            echo "Tentativa $i/10..."
            sleep 10
          done
          echo "WARN: Backend não respondeu externamente (pode ser firewall)"

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key /tmp/backend.tar.gz
