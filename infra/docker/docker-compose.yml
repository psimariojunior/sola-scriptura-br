version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sola-scriptura-db
    environment:
      POSTGRES_USER: sola_scriptura
      POSTGRES_PASSWORD: sola_scriptura
      POSTGRES_DB: sola_scriptura
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - sola_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sola_scriptura"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sola-scriptura-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sola_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: sola-scriptura-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - sola_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: sola-scriptura-rmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - sola_network
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: ../infra/docker/Dockerfile.backend
    container_name: sola-scriptura-api
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=sola_scriptura
      - DB_PASSWORD=sola_scriptura
      - DB_NAME=sola_scriptura
      - REDIS_HOST=redis
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - RABBITMQ_URL=amqp://rabbitmq:5672
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - sola_network
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: ../infra/docker/Dockerfile.frontend
    container_name: sola-scriptura-web
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - sola_network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: sola-scriptura-mon
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - sola_network

  grafana:
    image: grafana/grafana:latest
    container_name: sola-scriptura-grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - sola_network
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:

networks:
  sola_network:
    driver: bridge
