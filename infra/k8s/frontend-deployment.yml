apiVersion: apps/v1
kind: Deployment
metadata:
  name: sola-scriptura-frontend
  namespace: sola-scriptura
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sola-scriptura-frontend
  template:
    metadata:
      labels:
        app: sola-scriptura-frontend
    spec:
      containers:
        - name: frontend
          image: sola-scriptura/frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.sola-scriptura.com"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "400m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: sola-scriptura
spec:
  selector:
    app: sola-scriptura-frontend
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
