name: Deploy Backend to Oracle VM

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:

env:
  VM_HOST: ${{ secrets.Oracle_VM_IP }}
  VM_USER: ${{ secrets.Oracle_VM_USER }}
  DEPLOY_DIR: /opt/sola-scriptura

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Build
        working-directory: backend
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VM
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            backend/ \
            ${{ env.VM_USER }}@${{ env.VM_HOST }}:${{ env.DEPLOY_DIR }}/backend/

      - name: Copy docker files
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key" \
            backend/docker/ \
            ${{ env.VM_USER }}@${{ env.VM_HOST }}:${{ env.DEPLOY_DIR }}/

      - name: Deploy env file
        run: |
          scp -i ~/.ssh/deploy_key \
            backend/.env.production \
            ${{ env.VM_USER }}@${{ env.VM_HOST }}:${{ env.DEPLOY_DIR }}/.env

      - name: Restart services
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.VM_USER }}@${{ env.VM_HOST }} << 'EOF'
            cd /opt/sola-scriptura
            docker-compose down
            docker-compose up -d --build
            sleep 10
            docker-compose logs --tail=20 backend
          EOF

      - name: Health check
        run: |
          sleep 15
          curl -f https://${{ secrets.DOMAIN }}/api/v1/health || exit 1

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/deploy_key